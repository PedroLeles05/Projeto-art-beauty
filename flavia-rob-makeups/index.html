<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art & Beauty</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/input.css">
    <link rel="stylesheet" href="assets/css/output.css">
</head>


<body>

    <!--NavBar-->
    <header class="flex justify-end fixed z-10 p-12 w-full">
        <nav class="flex">
            <ul class="flex gap-5 font-body text-xl text-white/85 transition cursor-pointer">
                <li class="hover:text-white">Home</li>
                <li class="hover:text-white">Sobre</li>
                <li class="hover:text-white">Galeria</li>
                <li class="hover:text-white">Serviços</li>
                <li class="hover:text-white">Cursos</li>
            </ul>
        </nav>
    </header>

    <!--Hero-->
    <section class="flex justify-center relative bg-circo bg-cover bg-center min-h-screen overflow-hidden">
        <div class="absolute bg-primary/55 inset-0"></div>

        <div class="absolute top-20 left-12 w-[400px] h-[500px] rounded-full bg-btn/15 blur-[120px] pointer-events-none"></div>
        <div class="absolute bottom-9 right-10 w-[400px] h-[500px] rounded-full bg-white/15 blur-[120px] pointer-events-none"></div>


        <div class="relative z-10 flex flex-col justify-center items-center gap-[34px] ">

            <div class="bg-btn/40 outline-1 outline-white/30 text-white/60 font-body text-xs font-light size-fit rounded-[20px] py-1.5 px-3 tracking-[2%]">ENTRE TANTAS E TINTAS</div>
            
            <div class="flex flex-col items-center gap-4">
                <h1 class="text-white/90 font-title text-9xl font-bold tracking-[4%]">Art & Beauty</h1>
                <h2 class="text-white/75 text-base font-body tracking[4%]">Cada rosto é uma tela, cada traço uma história. Descubra a estética que transcende tendências e revela a sua verdadeira essência.</h2>
            </div> 
            
            <div class="bg-btn/70 hover:bg-btn/90 transition cursor-pointer text-base text-white/80 tracking-[1%] py-4 px-10 rounded-[10px]">EXPLORE O PORTIFÓLIO</div>
        </div>

    </section>

</body>
</html>
